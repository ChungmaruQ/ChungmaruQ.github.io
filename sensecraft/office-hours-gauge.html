<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Office Hours Door Display</title>
    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --ink: #000000;
        --muted: #000000;
        --line: #000000;
        --accent: #000000;
        --accent-soft: #ffffff;
        --accent-ink: #000000;
        --office: #00ff00;
        --away: #ff0000;
        --focus: #0000ff;
        --remote: #0000ff;
        --sun: #ffff00;
        --sky: #0000ff;
        --leaf: #00ff00;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 800px;
        height: 480px;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        font-synthesis: none;
        -webkit-font-smoothing: none;
        text-rendering: optimizeSpeed;
      }

      .canvas {
        position: relative;
        width: 800px;
        height: 480px;
        overflow: hidden;
        background: var(--bg);
        transform: scale(var(--scale, 1));
        transform-origin: top left;
      }

      .label {
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .top {
        position: absolute;
        inset: 0 0 auto 0;
        height: 78px;
        background: var(--panel);
        border-bottom: 4px solid var(--ink);
      }

      .top::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 800px;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--leaf) 0 22%,
          var(--sun) 22% 47%,
          var(--ink) 47% 73%,
          var(--sky) 73% 100%
        );
      }

      .brand {
        position: absolute;
        left: 24px;
        top: 18px;
      }

      .name-line {
        margin-top: 7px;
        display: flex;
        align-items: center;
        max-width: 430px;
      }

      .name {
        min-width: 0;
        max-width: 320px;
        overflow: hidden;
        color: var(--ink);
        font-size: 30px;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
      }

      .battery-gauge {
        display: none;
        position: absolute;
        left: 184px;
        bottom: 18px;
        align-items: center;
        width: 48px;
        height: 20px;
        border: 2px solid var(--ink);
        border-radius: 4px;
        background: var(--panel);
        color: var(--ink);
      }

      .battery-gauge::after {
        content: "";
        position: absolute;
        right: -6px;
        top: 5px;
        width: 4px;
        height: 8px;
        border-radius: 0 3px 3px 0;
        background: var(--ink);
      }

      .battery-fill {
        position: absolute;
        left: 4px;
        top: 4px;
        bottom: 4px;
        width: 0%;
        border-radius: 2px;
        background: var(--battery-color, var(--leaf));
      }

      .battery-text {
        display: none;
      }

      .date-block {
        position: absolute;
        right: 24px;
        top: 18px;
        width: 210px;
        text-align: right;
      }

      .date {
        margin-top: 6px;
        color: var(--ink);
        font-size: 26px;
        font-weight: 700;
        line-height: 1;
      }

      .status-dot {
        position: absolute;
        left: 28px;
        top: 155px;
        display: grid;
        place-items: center;
        width: 106px;
        height: 106px;
        border: 8px solid var(--ink);
        border-radius: 50%;
        background: var(--panel);
        box-shadow: none;
      }

      .status-dot::before {
        content: "";
        position: absolute;
        inset: 16px;
        border: 6px solid var(--accent);
        border-radius: 50%;
      }

      .status-dot::after {
        content: "";
        position: relative;
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 50%;
        background: var(--accent);
        box-sizing: border-box;
      }

      .status {
        position: absolute;
        left: 166px;
        top: 130px;
        width: 390px;
      }

      .status-label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 118px;
        height: 44px;
        padding: 0 12px;
        border: 4px solid var(--accent);
        border-radius: 4px;
        background: var(--panel);
        color: var(--ink);
        font-size: 16px;
        font-weight: 700;
        line-height: 1;
        text-align: center;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .headline-shell {
        margin-top: 14px;
        width: 390px;
        height: 62px;
        overflow: hidden;
      }

      .headline-bitmap {
        display: block;
        width: 390px;
        height: 62px;
        image-rendering: pixelated;
      }

      .headline {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        border: 0;
        overflow: hidden;
        color: var(--ink);
        font-size: 52px;
        font-weight: 800;
        line-height: 0.98;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      .detail {
        margin-top: 12px;
        overflow: hidden;
        color: var(--muted);
        font-size: 20px;
        font-weight: 700;
        line-height: 1.1;
        white-space: nowrap;
      }

      .week-strip {
        display: none;
        margin-top: 12px;
        width: 372px;
      }

      .week-strip-label {
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .week-days {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }

      .week-day {
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        height: 36px;
        border: 3px solid var(--ink);
        border-radius: 4px;
        background: var(--panel);
        color: var(--ink);
        text-align: center;
        box-shadow: none;
      }

      .week-day .day {
        display: block;
        position: relative;
        z-index: 2;
        font-size: 16px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .week-day .mark {
        display: none;
      }

      .week-day .slash {
        display: none;
      }

      .week-day.away {
        border-color: var(--away);
        background: var(--panel);
        color: var(--ink);
        box-shadow: none;
      }

      .week-day.away .slash {
        display: block;
        position: absolute;
        z-index: 1;
        left: -7px;
        top: 14px;
        width: 82px;
        height: 7px;
        border-radius: 0;
        border: 0;
        background: var(--away);
        box-shadow: none;
        transform: rotate(-30deg);
        pointer-events: none;
      }

      .next {
        position: absolute;
        left: 594px;
        top: 108px;
        width: 182px;
        height: 218px;
        border: 4px solid var(--ink);
        border-radius: 4px;
        background: var(--panel);
        box-shadow: none;
      }

      .next .label {
        position: absolute;
        left: 16px;
        top: 18px;
        width: 145px;
        color: var(--muted);
      }

      .next-time {
        position: absolute;
        left: 16px;
        top: 55px;
        width: 156px;
        color: var(--ink);
        font-size: 30px;
        font-weight: 800;
        line-height: 1.02;
        white-space: normal;
      }

      .bottom {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 800px;
        height: 124px;
        border-top: 4px solid var(--ink);
        background: var(--panel);
      }

      .bottom::before {
        content: "";
        position: absolute;
        left: 255px;
        right: 0;
        top: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--sun) 0 22%,
          var(--sky) 22% 50%,
          var(--leaf) 50% 75%,
          var(--ink) 75% 100%
        );
      }

      .hours {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 255px;
        height: 124px;
        padding: 14px 22px 17px;
        border-top: 6px solid var(--office);
        background: var(--panel);
        border-right: 4px solid var(--ink);
      }

      .hours .label {
        color: var(--muted);
      }

      .hours-value {
        margin-top: 9px;
        color: var(--ink);
        font-size: 24px;
        font-weight: 800;
        line-height: 1.2;
      }

      .agenda {
        position: absolute;
        left: 278px;
        right: 22px;
        bottom: 18px;
        height: 70px;
      }

      .agenda-label {
        position: absolute;
        left: 278px;
        bottom: 93px;
        z-index: 2;
        width: 180px;
        color: var(--ink);
        white-space: nowrap;
      }

      .agenda-item {
        position: absolute;
        top: 0;
        width: 230px;
        height: 70px;
        padding: 10px 12px 10px 15px;
        border: 2px solid var(--ink);
        border-left: 8px solid var(--accent);
        border-radius: 4px;
        background: var(--panel);
      }

      .agenda-item.second {
        left: 252px;
        border-color: var(--ink);
        border-left-color: var(--ink);
      }

      .agenda-time {
        overflow: hidden;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.1;
        white-space: nowrap;
      }

      .agenda-title {
        margin-top: 5px;
        overflow: hidden;
        color: var(--ink);
        font-size: 20px;
        font-weight: 800;
        line-height: 1.1;
        white-space: nowrap;
      }

      .quote-card {
        display: none;
        position: absolute;
        left: 278px;
        right: 58px;
        bottom: 18px;
        height: 70px;
        padding: 5px 0 5px 16px;
        border-left: 8px solid var(--ink);
        background: var(--panel);
      }

      .quote-en {
        overflow: hidden;
        color: var(--ink);
        font-size: 21px;
        font-weight: 800;
        line-height: 1.15;
        white-space: nowrap;
      }

      .quote-author {
        margin-top: 9px;
        overflow: hidden;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.15;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .updated {
        position: absolute;
        right: 22px;
        bottom: 7px;
        color: var(--ink);
        font-size: 10px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <section class="top">
        <div class="brand">
          <div class="label">Office Hours</div>
          <div class="name-line">
            <div class="name" data-field="display_name">Prof. Hyunwoo Kim</div>
          </div>
        </div>
        <div class="date-block">
          <div class="label">Today</div>
          <div class="date" data-field="date"></div>
        </div>
      </section>

      <div class="status-dot" aria-hidden="true"></div>

      <section class="status">
        <div class="status-label" data-field="status_label">Loading</div>
        <div class="headline-shell">
          <canvas class="headline-bitmap" width="390" height="62" aria-hidden="true"></canvas>
          <div class="headline" data-field="headline">Checking</div>
        </div>
        <div class="detail" data-field="detail">Updating status.</div>
        <div class="week-strip" aria-label="Away days this week">
          <div class="week-strip-label">Away This Week</div>
          <div class="week-days"></div>
        </div>
      </section>

      <section class="next">
        <div class="label">Next Available</div>
        <div class="next-time" data-field="next_available"></div>
      </section>

      <section class="bottom">
        <div class="hours">
          <div class="label">Office Hours</div>
          <div class="hours-value" data-field="todays_hours">09:30-12:00 / 13:00-17:00</div>
          <div class="battery-gauge" aria-label="Battery level">
            <div class="battery-fill" aria-hidden="true"></div>
            <div class="battery-text" data-field="battery_level"></div>
          </div>
        </div>
        <div class="agenda-label label">Up Next</div>
        <div class="agenda">
          <div class="agenda-item">
            <div class="agenda-time" data-field="up_next_1_time"></div>
            <div class="agenda-title" data-field="up_next_1_title"></div>
          </div>
          <div class="agenda-item second">
            <div class="agenda-time" data-field="up_next_2_time"></div>
            <div class="agenda-title" data-field="up_next_2_title"></div>
          </div>
        </div>
        <div class="quote-card" aria-label="Today's thought">
          <div class="quote-en"></div>
          <div class="quote-author"></div>
        </div>
      </section>

      <div class="updated">Updated <span data-field="updated_at"></span></div>
    </main>

    <script>
      const fallbackStatus = {
        display_name: "Prof. Hyunwoo Kim",
        date: "",
        state: "setup",
        status_label: "Loading",
        headline: "Checking",
        detail: "Updating status.",
        next_available: "",
        todays_hours: "09:30-12:00 / 13:00-17:00",
        battery_level: "",
        away_days: [],
        up_next_1_time: "",
        up_next_1_title: "",
        up_next_2_time: "",
        up_next_2_title: "",
        updated_at: ""
      };

      const params = new URLSearchParams(window.location.search);
      const refreshMs = 60 * 1000;
      const dataUrl =
        params.get("data") ||
        window.OFFICE_HOURS_DATA_URL ||
        "https://raw.githubusercontent.com/ChungmaruQ/desktop-tutorial/master/sensecraft.json";
      let hasLoadedStatus = false;

      function fitCanvasToViewport() {
        const width = window.innerWidth || 800;
        const height = window.innerHeight || 480;
        const scale = Math.min(1, width / 800, height / 480);
        document.documentElement.style.setProperty("--scale", String(scale || 1));
      }

      function withCacheBust(url) {
        const nextUrl = new URL(url, window.location.href);
        nextUrl.searchParams.set("_", Date.now().toString());
        return nextUrl.toString();
      }

      function applyStatus(status) {
        document.querySelectorAll("[data-field]").forEach((element) => {
          const field = element.getAttribute("data-field");
          element.textContent = status[field] ?? "";
        });

        updateNextCard(status);
        updateStatusBadge(status);
        updateAgendaVisibility();
        updateBatteryVisibility();
        updateWeekStrip(status);
        fitDynamicText();
        renderBitmapHeadline(status.headline || "");

        const state = status.state || "";
        const root = document.documentElement;
        if (state === "available") {
          root.style.setProperty("--accent", "#00ff00");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "away" || state === "leave") {
          root.style.setProperty("--accent", "#ff0000");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "focus" || state === "meeting" || state === "teaching") {
          root.style.setProperty("--accent", "#0000ff");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "lunch") {
          root.style.setProperty("--accent", "#ffff00");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "remote") {
          root.style.setProperty("--accent", "#0000ff");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "off_hours" || state === "offsite" || state === "closed") {
          root.style.setProperty("--accent", "#000000");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else {
          root.style.setProperty("--accent", "#000000");
          root.style.setProperty("--accent-soft", "#ffffff");
        }
      }

      function fitDynamicText() {
        fitTextToWidth(".detail", 20, 16);
        fitTextToWidth(".next-time", 30, 22);
        fitTextToWidth(".hours-value", 24, 18);
        fitTextToWidth(".agenda-time", 14, 11);
        fitTextToWidth(".agenda-title", 20, 14);
        fitTextToWidth(".quote-en", 21, 17);
        fitTextToWidth(".quote-author", 13, 11);
      }

      function renderBitmapHeadline(text) {
        const canvas = document.querySelector(".headline-bitmap");
        if (!canvas) return;

        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const width = canvas.width;
        const height = canvas.height;
        ctx.clearRect(0, 0, width, height);

        let size = 52;
        while (size > 36) {
          ctx.font = `800 ${size}px Arial, Helvetica, sans-serif`;
          if (ctx.measureText(text).width <= width) break;
          size -= 1;
        }

        ctx.font = `800 ${size}px Arial, Helvetica, sans-serif`;
        ctx.textBaseline = "alphabetic";
        ctx.fillStyle = "#000000";

        const metrics = ctx.measureText(text);
        const ascent = metrics.actualBoundingBoxAscent || size * 0.8;
        const descent = metrics.actualBoundingBoxDescent || size * 0.2;
        const y = Math.round((height - ascent - descent) / 2 + ascent);
        ctx.fillText(text, 0, y);

        thresholdCanvas(ctx, width, height, 120);
      }

      function thresholdCanvas(ctx, width, height, alphaThreshold) {
        const image = ctx.getImageData(0, 0, width, height);
        const pixels = image.data;
        for (let i = 0; i < pixels.length; i += 4) {
          if (pixels[i + 3] > alphaThreshold) {
            pixels[i] = 0;
            pixels[i + 1] = 0;
            pixels[i + 2] = 0;
            pixels[i + 3] = 255;
          } else {
            pixels[i + 3] = 0;
          }
        }
        ctx.putImageData(image, 0, 0);
      }

      function updateNextCard(status) {
        const label = document.querySelector(".next .label");
        const value = document.querySelector("[data-field='next_available']");
        if (!label || !value) return;

        if (status.state === "available") {
          label.textContent = "Available Until";
          value.textContent = status.current_until || "Now";
          return;
        }

        label.textContent = "Next Available";
        value.textContent = status.next_available || "";
      }

      function updateStatusBadge(status) {
        const badge = document.querySelector(".status-label");
        if (!badge) return;

        const state = status.state || "";
        const badgeLabels = {
          available: "Visits OK",
          busy: "Do Not Disturb",
          meeting: "Do Not Disturb",
          teaching: "Do Not Disturb",
          focus: "Do Not Disturb",
          lunch: "Back Soon",
          remote: "Remote",
          away: "Away",
          offsite: "Away",
          leave: "Away",
          off_hours: "Away",
          closed: "Closed",
          setup: "Setup"
        };

        badge.textContent = badgeLabels[state] || status.status_label || "Status";
      }

      function updateWeekStrip(status) {
        const strip = document.querySelector(".week-strip");
        const daysEl = document.querySelector(".week-days");
        if (!strip || !daysEl) return;

        const hasAwayDays = Object.prototype.hasOwnProperty.call(status, "away_days");
        const awayDays = normalizeAwayDays(status.away_days);
        const shouldShow = hasAwayDays && awayDays.length > 0;
        if (!shouldShow) {
          strip.style.display = "none";
          daysEl.innerHTML = "";
          return;
        }

        const dayLabels = ["Mon", "Tue", "Wed", "Thu", "Fri"];
        daysEl.innerHTML = dayLabels.map((day) => {
          const isAway = awayDays.includes(day.toLowerCase());
          return `
            <div class="week-day${isAway ? " away" : ""}" aria-label="${day} ${isAway ? "away" : "in office"}">
              ${isAway ? '<span class="slash" aria-hidden="true"></span>' : ''}
              <span class="day">${day}</span>
            </div>
          `;
        }).join("");
        strip.style.display = "block";
      }

      function normalizeAwayDays(value) {
        if (Array.isArray(value)) {
          return value.map(normalizeDayLabel).filter(Boolean);
        }
        return String(value || "")
          .split(",")
          .map(normalizeDayLabel)
          .filter(Boolean);
      }

      function normalizeDayLabel(value) {
        const text = String(value || "").trim().toLowerCase();
        const aliases = {
          m: "mon",
          monday: "mon",
          mon: "mon",
          tuesday: "tue",
          tue: "tue",
          wednesday: "wed",
          wed: "wed",
          thursday: "thu",
          thu: "thu",
          friday: "fri",
          fri: "fri"
        };
        return aliases[text] || "";
      }

      function fitTextToWidth(selector, maxPx, minPx) {
        document.querySelectorAll(selector).forEach((element) => {
          element.style.fontSize = `${maxPx}px`;
          if (element.offsetParent === null) return;

          let size = maxPx;
          while (size > minPx && element.scrollWidth > element.clientWidth) {
            size -= 1;
            element.style.fontSize = `${size}px`;
          }
        });
      }

      function updateAgendaVisibility() {
        const items = document.querySelectorAll(".agenda-item");
        const quote = document.querySelector(".quote-card");
        let visibleCount = 0;
        items.forEach((item) => {
          const hasContent = item.textContent.trim().length > 0;
          item.style.display = hasContent ? "block" : "none";
          if (hasContent) visibleCount += 1;
        });

        const label = document.querySelector(".agenda-label");
        if (label) {
          label.textContent = visibleCount > 0 ? "Up Next" : "Today's Thought";
          label.style.display = "block";
        }

        if (quote) {
          quote.style.display = visibleCount > 0 ? "none" : "block";
          if (visibleCount === 0) {
            renderQuote();
          }
        }
      }

      function renderQuote() {
        const quotes = [
          {
            text: "Well begun is half done.",
            author: "Aristotle"
          },
          {
            text: "No great thing is created suddenly.",
            author: "Epictetus"
          },
          {
            text: "Know thyself.",
            author: "Socrates"
          },
          {
            text: "Fortune favors the bold.",
            author: "Virgil"
          },
          {
            text: "Make haste slowly.",
            author: "Augustus"
          }
        ];
        const dateSeed =
          document.querySelector("[data-field='date']")?.textContent ||
          document.querySelector("[data-field='updated_at']")?.textContent ||
          new Date().toDateString();
        const index = hashText(dateSeed) % quotes.length;
        const quote = quotes[index];
        document.querySelector(".quote-en").textContent = quote.text;
        document.querySelector(".quote-author").textContent = quote.author;
      }

      function hashText(value) {
        return Array.from(String(value)).reduce((hash, char) => {
          return (hash * 31 + char.charCodeAt(0)) >>> 0;
        }, 7);
      }

      function updateBatteryVisibility() {
        const gauge = document.querySelector(".battery-gauge");
        const fill = document.querySelector(".battery-fill");
        const text = document.querySelector(".battery-text");
        if (!gauge || !fill || !text) return;

        const rawValue = text.textContent.trim();
        if (!rawValue) {
          gauge.style.display = "none";
          fill.style.width = "0px";
          return;
        }

        const numeric = Number(rawValue.replace("%", ""));
        const percent = Number.isFinite(numeric) ? Math.max(0, Math.min(100, numeric)) : 0;
        gauge.style.display = "flex";
        gauge.setAttribute("aria-label", `Battery ${percent}%`);
        fill.style.width = `calc((100% - 8px) * ${percent / 100})`;
        fill.style.background = batteryColor(percent);
      }

      function batteryColor(percent) {
        if (percent < 30) return "#ff0000";
        if (percent < 60) return "#ffff00";
        return "#00ff00";
      }

      async function loadStatus() {
        if (!dataUrl) {
          if (!hasLoadedStatus) applyStatus(fallbackStatus);
          return;
        }

        try {
          const response = await fetch(withCacheBust(dataUrl), { cache: "no-store" });
          if (!response.ok) throw new Error("Status fetch failed");
          applyStatus(await response.json());
          hasLoadedStatus = true;
        } catch (error) {
          if (!hasLoadedStatus) {
            applyStatus(fallbackStatus);
          }
        }
      }

      fitCanvasToViewport();
      loadStatus();
      window.addEventListener("resize", fitCanvasToViewport);
      if (dataUrl) {
        setInterval(loadStatus, refreshMs);
      }
    </script>
  </body>
</html>
