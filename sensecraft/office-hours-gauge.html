<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="refresh" content="900">
    <title>Office Hours Door Display</title>
    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --ink: #111111;
        --muted: #454545;
        --line: #111111;
        --accent: #e07a2f;
        --accent-soft: #ffffff;
        --accent-ink: #111111;
        --office: #00875a;
        --away: #c53131;
        --focus: #5f45a8;
        --remote: #006f9f;
        --sun: #f0b400;
        --sky: #0089c7;
        --leaf: #00875a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        font-synthesis: none;
        -webkit-font-smoothing: none;
        text-rendering: optimizeSpeed;
      }

      .canvas {
        position: relative;
        width: 800px;
        height: 480px;
        overflow: hidden;
        background: var(--bg);
        transform: scale(var(--scale, 1));
        transform-origin: top left;
      }

      .label {
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .top {
        position: absolute;
        inset: 0 0 auto 0;
        height: 78px;
        background: var(--panel);
        border-bottom: 3px solid var(--ink);
      }

      .top::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 800px;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--leaf) 0 22%,
          var(--sun) 22% 47%,
          var(--accent) 47% 73%,
          var(--sky) 73% 100%
        );
      }

      .brand {
        position: absolute;
        left: 24px;
        top: 18px;
      }

      .name-line {
        margin-top: 7px;
        display: flex;
        align-items: center;
        max-width: 430px;
      }

      .name {
        min-width: 0;
        max-width: 320px;
        overflow: hidden;
        color: var(--ink);
        font-size: 30px;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
      }

      .battery-gauge {
        display: none;
        position: absolute;
        left: 184px;
        bottom: 18px;
        align-items: center;
        width: 48px;
        height: 20px;
        border: 2px solid var(--ink);
        border-radius: 4px;
        background: var(--panel);
        color: var(--ink);
      }

      .battery-gauge::after {
        content: "";
        position: absolute;
        right: -6px;
        top: 5px;
        width: 4px;
        height: 8px;
        border-radius: 0 3px 3px 0;
        background: var(--ink);
      }

      .battery-fill {
        position: absolute;
        left: 3px;
        top: 3px;
        bottom: 3px;
        width: 0%;
        border-radius: 2px;
        background: var(--battery-color, var(--leaf));
      }

      .battery-text {
        display: none;
      }

      .date-block {
        position: absolute;
        right: 24px;
        top: 18px;
        width: 210px;
        text-align: right;
      }

      .date {
        margin-top: 6px;
        color: var(--ink);
        font-size: 26px;
        font-weight: 700;
        line-height: 1;
      }

      .status-dot {
        position: absolute;
        left: 28px;
        top: 155px;
        display: grid;
        place-items: center;
        width: 106px;
        height: 106px;
        border: 7px solid var(--ink);
        border-radius: 50%;
        background: var(--panel);
        box-shadow: none;
      }

      .status-dot::before {
        content: "";
        position: absolute;
        inset: 15px;
        border: 7px solid var(--accent);
        border-radius: 50%;
      }

      .status-dot::after {
        content: "";
        position: relative;
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 50%;
        background: var(--accent);
        box-sizing: border-box;
      }

      .status {
        position: absolute;
        left: 166px;
        top: 130px;
        width: 390px;
      }

      .status-label {
        display: inline-block;
        padding: 7px 11px;
        border: 3px solid var(--accent);
        border-radius: 5px;
        background: var(--panel);
        color: var(--accent);
        font-size: 16px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .headline {
        margin-top: 14px;
        overflow: hidden;
        color: var(--ink);
        font-size: 52px;
        font-weight: 800;
        line-height: 0.98;
        white-space: nowrap;
      }

      .detail {
        margin-top: 12px;
        overflow: hidden;
        color: var(--muted);
        font-size: 20px;
        font-weight: 700;
        line-height: 1.1;
        white-space: nowrap;
      }

      .week-strip {
        display: none;
        margin-top: 18px;
        width: 372px;
      }

      .week-strip-label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .week-days {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }

      .week-day {
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        height: 44px;
        border: 3px solid var(--ink);
        border-radius: 6px;
        background: var(--panel);
        color: var(--ink);
        text-align: center;
        box-shadow: none;
      }

      .week-day .day {
        display: block;
        position: relative;
        z-index: 2;
        font-size: 18px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .week-day .mark {
        display: none;
      }

      .week-day .slash {
        display: none;
      }

      .week-day.away {
        border-color: var(--accent);
        background: var(--panel);
        color: var(--ink);
        box-shadow: none;
      }

      .week-day.away .slash {
        display: block;
        position: absolute;
        z-index: 1;
        left: -9px;
        top: 19px;
        width: 91px;
        height: 7px;
        border-radius: 999px;
        border: 0;
        background: var(--ink);
        box-shadow: none;
        transform: rotate(-30deg);
        pointer-events: none;
      }

      .next {
        position: absolute;
        left: 594px;
        top: 108px;
        width: 182px;
        height: 218px;
        border: 3px solid var(--ink);
        border-radius: 6px;
        background: var(--panel);
        box-shadow: none;
      }

      .next .label {
        position: absolute;
        left: 16px;
        top: 18px;
        width: 145px;
        color: var(--muted);
      }

      .next-time {
        position: absolute;
        left: 16px;
        top: 55px;
        width: 156px;
        color: var(--ink);
        font-size: 30px;
        font-weight: 800;
        line-height: 1.02;
        white-space: normal;
      }

      .bottom {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 800px;
        height: 124px;
        border-top: 3px solid var(--ink);
        background: var(--panel);
      }

      .bottom::before {
        content: "";
        position: absolute;
        left: 255px;
        right: 0;
        top: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--sun) 0 24%,
          var(--sky) 24% 52%,
          var(--leaf) 52% 76%,
          var(--accent) 76% 100%
        );
      }

      .hours {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 255px;
        height: 124px;
        padding: 14px 22px 17px;
        border-top: 6px solid var(--office);
        background: var(--panel);
        border-right: 3px solid var(--ink);
      }

      .hours .label {
        color: var(--muted);
      }

      .hours-value {
        margin-top: 9px;
        color: var(--ink);
        font-size: 24px;
        font-weight: 800;
        line-height: 1.2;
      }

      .agenda {
        position: absolute;
        left: 278px;
        right: 22px;
        bottom: 18px;
        height: 70px;
      }

      .agenda-label {
        position: absolute;
        left: 278px;
        bottom: 93px;
        color: #1f6c86;
      }

      .agenda-item {
        position: absolute;
        top: 0;
        width: 230px;
        height: 70px;
        padding: 10px 12px 10px 15px;
        border: 2px solid var(--ink);
        border-left: 8px solid var(--accent);
        border-radius: 6px;
        background: var(--panel);
      }

      .agenda-item.second {
        left: 252px;
        border-color: var(--sky);
      }

      .agenda-time {
        overflow: hidden;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.1;
        white-space: nowrap;
      }

      .agenda-title {
        margin-top: 5px;
        overflow: hidden;
        color: var(--ink);
        font-size: 20px;
        font-weight: 800;
        line-height: 1.1;
        white-space: nowrap;
      }

      .updated {
        position: absolute;
        right: 22px;
        bottom: 7px;
        color: #657174;
        font-size: 10px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <section class="top">
        <div class="brand">
          <div class="label">Office Hours</div>
          <div class="name-line">
            <div class="name" data-field="display_name">Prof. Hyunwoo Kim</div>
          </div>
        </div>
        <div class="date-block">
          <div class="label">Today</div>
          <div class="date" data-field="date">Mon, Jun 15</div>
        </div>
      </section>

      <div class="status-dot" aria-hidden="true"></div>

      <section class="status">
        <div class="status-label" data-field="status_label">Busy</div>
        <div class="headline" data-field="headline">In a Meeting</div>
        <div class="detail" data-field="detail">Busy right now.</div>
        <div class="week-strip" aria-label="Away days this week">
          <div class="week-strip-label">Away Days</div>
          <div class="week-days"></div>
        </div>
      </section>

      <section class="next">
        <div class="label">Next Available</div>
        <div class="next-time" data-field="next_available">16:16</div>
      </section>

      <section class="bottom">
        <div class="hours">
          <div class="label">Office Hours</div>
          <div class="hours-value" data-field="todays_hours">09:30-12:00 / 13:00-17:00</div>
          <div class="battery-gauge" aria-label="Battery level">
            <div class="battery-fill" aria-hidden="true"></div>
            <div class="battery-text" data-field="battery_level"></div>
          </div>
        </div>
        <div class="agenda-label label">Up Next</div>
        <div class="agenda">
          <div class="agenda-item">
            <div class="agenda-time" data-field="up_next_1_time">15:31-16:16</div>
            <div class="agenda-title" data-field="up_next_1_title">Busy</div>
          </div>
          <div class="agenda-item second">
            <div class="agenda-time" data-field="up_next_2_time">17:21-18:21</div>
            <div class="agenda-title" data-field="up_next_2_title">Office Hours</div>
          </div>
        </div>
      </section>

      <div class="updated">Updated <span data-field="updated_at">Jun 15, 15:51</span></div>
    </main>

    <script>
      const fallbackStatus = {
        display_name: "Prof. Hyunwoo Kim",
        date: "Mon, Jun 15",
        state: "busy",
        status_label: "Busy",
        headline: "In a Meeting",
        detail: "Busy right now.",
        next_available: "16:16",
        todays_hours: "09:30-12:00 / 13:00-17:00",
        battery_level: "",
        away_days: [],
        up_next_1_time: "15:31-16:16",
        up_next_1_title: "Busy",
        up_next_2_time: "17:21-18:21",
        up_next_2_title: "Office Hours",
        updated_at: "Jun 15, 15:51"
      };

      const params = new URLSearchParams(window.location.search);
      const refreshMs = 15 * 60 * 1000;
      const dataUrl =
        params.get("data") ||
        window.OFFICE_HOURS_DATA_URL ||
        "https://raw.githubusercontent.com/ChungmaruQ/desktop-tutorial/master/sensecraft.json";

      function fitCanvasToViewport() {
        const width = window.innerWidth || 800;
        const height = window.innerHeight || 480;
        const scale = Math.min(1, width / 800, height / 480);
        document.documentElement.style.setProperty("--scale", String(scale || 1));
      }

      function withCacheBust(url) {
        const nextUrl = new URL(url, window.location.href);
        nextUrl.searchParams.set("_", Date.now().toString());
        return nextUrl.toString();
      }

      function applyStatus(status) {
        document.querySelectorAll("[data-field]").forEach((element) => {
          const field = element.getAttribute("data-field");
          element.textContent = status[field] ?? "";
        });

        updateNextCard(status);
        updateAgendaVisibility();
        updateBatteryVisibility();
        updateWeekStrip(status);
        fitDynamicText();

        const state = status.state || "";
        const root = document.documentElement;
        if (state === "available") {
          root.style.setProperty("--accent", "#00875a");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "away" || state === "leave") {
          root.style.setProperty("--accent", "#c53131");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "focus") {
          root.style.setProperty("--accent", "#5f45a8");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "lunch") {
          root.style.setProperty("--accent", "#b77700");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "remote") {
          root.style.setProperty("--accent", "#006f9f");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else if (state === "off_hours" || state === "offsite" || state === "closed") {
          root.style.setProperty("--accent", "#111111");
          root.style.setProperty("--accent-soft", "#ffffff");
        } else {
          root.style.setProperty("--accent", "#e07a2f");
          root.style.setProperty("--accent-soft", "#ffffff");
        }
      }

      function fitDynamicText() {
        fitTextToWidth(".headline", 52, 36);
        fitTextToWidth(".detail", 20, 16);
        fitTextToWidth(".next-time", 30, 22);
        fitTextToWidth(".hours-value", 24, 18);
        fitTextToWidth(".agenda-title", 20, 14);
      }

      function updateNextCard(status) {
        const label = document.querySelector(".next .label");
        const value = document.querySelector("[data-field='next_available']");
        if (!label || !value) return;

        if (status.state === "available") {
          label.textContent = "Available Until";
          value.textContent = status.current_until || "Now";
          return;
        }

        label.textContent = "Next Available";
        value.textContent = status.next_available || "";
      }

      function updateWeekStrip(status) {
        const strip = document.querySelector(".week-strip");
        const daysEl = document.querySelector(".week-days");
        if (!strip || !daysEl) return;

        const statesWithStrip = ["away", "leave", "offsite", "off_hours", "closed"];
        const hasAwayDays = Object.prototype.hasOwnProperty.call(status, "away_days");
        const shouldShow = hasAwayDays && statesWithStrip.includes(status.state || "");
        if (!shouldShow) {
          strip.style.display = "none";
          daysEl.innerHTML = "";
          return;
        }

        const awayDays = normalizeAwayDays(status.away_days);
        const dayLabels = ["Mon", "Tue", "Wed", "Thu", "Fri"];
        daysEl.innerHTML = dayLabels.map((day) => {
          const isAway = awayDays.includes(day.toLowerCase());
          return `
            <div class="week-day${isAway ? " away" : ""}" aria-label="${day} ${isAway ? "away" : "in office"}">
              ${isAway ? '<span class="slash" aria-hidden="true"></span>' : ''}
              <span class="day">${day}</span>
            </div>
          `;
        }).join("");
        strip.style.display = "block";
      }

      function normalizeAwayDays(value) {
        if (Array.isArray(value)) {
          return value.map(normalizeDayLabel).filter(Boolean);
        }
        return String(value || "")
          .split(",")
          .map(normalizeDayLabel)
          .filter(Boolean);
      }

      function normalizeDayLabel(value) {
        const text = String(value || "").trim().toLowerCase();
        const aliases = {
          m: "mon",
          monday: "mon",
          mon: "mon",
          tuesday: "tue",
          tue: "tue",
          wednesday: "wed",
          wed: "wed",
          thursday: "thu",
          thu: "thu",
          friday: "fri",
          fri: "fri"
        };
        return aliases[text] || "";
      }

      function fitTextToWidth(selector, maxPx, minPx) {
        document.querySelectorAll(selector).forEach((element) => {
          element.style.fontSize = `${maxPx}px`;
          if (element.offsetParent === null) return;

          let size = maxPx;
          while (size > minPx && element.scrollWidth > element.clientWidth) {
            size -= 1;
            element.style.fontSize = `${size}px`;
          }
        });
      }

      function updateAgendaVisibility() {
        const items = document.querySelectorAll(".agenda-item");
        let visibleCount = 0;
        items.forEach((item) => {
          const hasContent = item.textContent.trim().length > 0;
          item.style.display = hasContent ? "block" : "none";
          if (hasContent) visibleCount += 1;
        });

        const label = document.querySelector(".agenda-label");
        if (label) {
          label.style.display = visibleCount > 0 ? "block" : "none";
        }
      }

      function updateBatteryVisibility() {
        const gauge = document.querySelector(".battery-gauge");
        const fill = document.querySelector(".battery-fill");
        const text = document.querySelector(".battery-text");
        if (!gauge || !fill || !text) return;

        const rawValue = text.textContent.trim();
        if (!rawValue) {
          gauge.style.display = "none";
          fill.style.width = "0%";
          return;
        }

        const numeric = Number(rawValue.replace("%", ""));
        const percent = Number.isFinite(numeric) ? Math.max(0, Math.min(100, numeric)) : 0;
        gauge.style.display = "flex";
        gauge.setAttribute("aria-label", `Battery ${percent}%`);
        fill.style.width = `${percent}%`;
        fill.style.background = batteryColor(percent);
      }

      function batteryColor(percent) {
        if (percent < 30) return "#d64545";
        if (percent < 60) return "#f2be3e";
        return "#22a06b";
      }

      async function loadStatus() {
        if (!dataUrl) {
          applyStatus(fallbackStatus);
          return;
        }

        try {
          const response = await fetch(withCacheBust(dataUrl), { cache: "no-store" });
          if (!response.ok) throw new Error("Status fetch failed");
          applyStatus(await response.json());
        } catch (error) {
          applyStatus(fallbackStatus);
        }
      }

      fitCanvasToViewport();
      loadStatus();
      window.addEventListener("resize", fitCanvasToViewport);
      if (dataUrl) {
        setInterval(loadStatus, refreshMs);
      }
    </script>
  </body>
</html>
